<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Limpio — Sistema de Gestión</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">
    <!-- Animated Background -->
    <div class="bg-fabric">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <div class="grid-overlay"></div>
    <div class="grain"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i data-lucide="droplet" style="color: white; width: 24px; height: 24px;"></i>
                </div>
                <h1>Max<span>Limpio</span></h1>
            </div>
            <nav>
                <button class="nav-item active" data-page="dashboard">
                    <i data-lucide="layout-grid"></i>
                    <span>Panel Control</span>
                </button>
                <button class="nav-item" data-page="new-invoice">
                    <i data-lucide="plus"></i>
                    <span>Nueva Factura</span>
                </button>
                <button class="nav-item" data-page="invoices">
                    <i data-lucide="layers"></i>
                    <span>Historial</span>
                </button>
                <button class="nav-item" data-page="calculator">
                    <i data-lucide="calculator"></i>
                    <span>Calculadora IVA</span>
                </button>
                <button class="nav-item" data-page="clients">
                    <i data-lucide="users-2"></i>
                    <span>Clientes</span>
                </button>
                <button class="nav-item" data-page="settings">
                    <i data-lucide="settings"></i>
                    <span>Configuración</span>
                </button>
            </nav>
            <div id="sidebar-goal-widget" class="sidebar-widget" style="margin-top: auto; padding: 1.2rem; background: rgba(255,255,255,0.03); border-radius: var(--radius-md); border: 1px solid var(--line-soft); margin-bottom: 1rem; display: none;">
                <!-- Dynamically updated via app.js -->
            </div>
            <div class="sidebar-footer">
                <p>// PRO v2.0 — ACTIVE</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header class="content-header">
                <h2 id="page-title">Vista General</h2>
            </header>

            <div id="page-content">
                <!-- GSAP injected content -->
            </div>
        </main>
    </div>

    <div class="liquid-transition"></div>
    <div id="notifications"></div>

    <script src="app.js"></script>
</body>
</html>
